<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
</head>
<body>

<nav>
    <ul>
        <li><a href="/">Cadastro</a></li>
        <li><a href="/consulta">Consultar</a></li>
    </ul>
</nav>

<form id="formCadastro">
    <div>
        <label>Nome:</label>
        <input type="text" name="nome" required>
    </div>
    <div>
        <label>CPF:</label>
        <input type="text" name="CPF" required>
    </div>
    <div>
        <label>Email:</label>
        <input type="email" name="email" required>
    </div>
    <div>
        <label>Telefone:</label>
        <input type="text" name="Telefone" required>
    </div>
    <div>
        <label>Endereço:</label>
        <input type="text" name="endereco" required>
    </div>
    <div>
        <label>Observações:</label>
        <textarea name="observacoes"></textarea>
    </div>
    <button type="submit">Cadastrar</button>
</form>

<div id="mensagem"></div>

<script src="assets/js/main.js"></script>

    <header>
        <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="assets/img/banner1.jpg" class="d-block w-100" alt="Banner 1">
                </div>
                <div class="carousel-item">
                    <img src="assets/img/banner2.jpg" class="d-block w-100" alt="Banner 2">
                </div>
                <div class="carousel-item">
                    <img src="assets/img/banner3.jpg" class="=d-block w-100" alt="Banner 3">
                </div>
            </div>
        </div>
    </header>
</body>
</html>
