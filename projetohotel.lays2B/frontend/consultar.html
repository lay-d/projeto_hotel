<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Clientes</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body>


    <nav>
        <ul>
            <li><a href="/">Cadastro</a></li>
            <li><a href="/consulta">Consultar</a></li>
        </ul>
    </nav>
    
    <div class="containerPesquisa">
        <h2>Consulta de Clientes</h2>
        <div>
            <input type="text" id="campoBusca" placeholder="Digite o nome do cliente">
            <button id="btnBuscar">Buscar</button>
        </div>
    
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Endereço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaResultados"></tbody>
        </table>

    </div>

    <script src="assets/js/main.js"></script>

    <footer class="text-center mt-5 p-3 text-white bg-dark">
        <p>Sistema de Cadastro | Desenvolvido para fins didáticos</p>
    </footer>

</body>

</html>
