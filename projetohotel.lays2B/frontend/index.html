<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

</head>
<body>
    <header>
        <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="assets/img/banner1.jpg" class="d-block w-100" alt="Banner 1">
                </div>
                <div class="carousel-item">
                    <img src="assets/img/banner2.jpg" class="d-block w-100" alt="Banner 2">
                </div>
                <div class="carousel-item">
                    <img src="assets/img/banner3.jpg" class="=d-block w-100" alt="Banner 3">
                </div>
            </div>
        </div>
    </header>

<nav>
    <ul>
        <li><a href="/">Cadastro</a></li>
        <li><a href="/consulta">Consultar</a></li>
    </ul>
</nav>

<form id="formCadastro">
    <div>
        <label>Nome:</label>
        <input type="text" name="nome" required>
    </div>
    <div>
        <label>CPF:</label>
        <input type="text" name="CPF" required>
    </div>
    <div>
        <label>Email:</label>
        <input type="email" name="email" required>
    </div>
    <div>
        <label>Telefone:</label>
        <input type="text" name="Telefone" required>
    </div>
    <div>
        <label>Endereço:</label>
        <input type="text" name="endereco" required>
    </div>
    <div>
        <label>Observações:</label>
        <textarea name="observacoes"></textarea>
    </div>
    <button type="submit" class="btn-primary">Cadastrar</button>
</form>

<div id="mensagem"></div>
    
    <script src="assets/js/main.js"></script>

     <footer class="text-center mt-5 p-3 text-white bg-dark">
        <p>Sistema de Cadastro | Desenvolvido para fins didáticos</p>
     </footer>

</body>
</html>
